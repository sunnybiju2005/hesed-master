<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudinary Upload Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input[type="file"] {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            border-color: #c3e6cb;
        }
        .error {
            background: #f8d7da;
            border-color: #f5c6cb;
        }
        img {
            max-width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Cloudinary Upload Test</h1>
    <p>This page tests if Cloudinary uploads are working correctly.</p>
    
    <div>
        <label for="testImage">Select an image to upload:</label><br>
        <input type="file" id="testImage" accept="image/*">
    </div>
    
    <button onclick="testUpload()">Upload Image</button>
    
    <div id="result"></div>
    
    <script src="js/cloudinary-config.js"></script>
    <script src="js/cloudinary-service.js"></script>
    <script>
        async function testUpload() {
            const fileInput = document.getElementById('testImage');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files || !fileInput.files[0]) {
                resultDiv.innerHTML = '<p class="error">Please select an image first.</p>';
                return;
            }
            
            const file = fileInput.files[0];
            resultDiv.innerHTML = '<p>Uploading... Please check console (F12) for details.</p>';
            
            try {
                // Check config
                console.log('=== TEST UPLOAD START ===');
                console.log('1. Checking Cloudinary Config...');
                console.log('Config exists?', typeof cloudinaryConfig !== 'undefined');
                
                if (typeof cloudinaryConfig === 'undefined') {
                    throw new Error('cloudinaryConfig is not defined! Check if cloudinary-config.js is loaded.');
                }
                
                console.log('Cloudinary Config:', cloudinaryConfig);
                console.log('Upload Preset:', cloudinaryConfig.uploadPreset);
                console.log('Cloud Name:', cloudinaryConfig.cloudName);
                
                if (!cloudinaryConfig.uploadPreset) {
                    throw new Error('Upload preset is missing in configuration!');
                }
                
                console.log('2. Checking Upload URL...');
                console.log('Upload URL exists?', typeof cloudinaryUploadUrl !== 'undefined');
                console.log('Upload URL:', cloudinaryUploadUrl);
                
                console.log('3. Checking Upload Function...');
                console.log('uploadImageToCloudinary exists?', typeof uploadImageToCloudinary !== 'undefined');
                
                if (typeof uploadImageToCloudinary === 'undefined') {
                    throw new Error('uploadImageToCloudinary function is not defined! Check if cloudinary-service.js is loaded.');
                }
                
                console.log('4. File Details:');
                console.log('  - Name:', file.name);
                console.log('  - Size:', file.size, 'bytes');
                console.log('  - Type:', file.type);
                
                console.log('5. Starting upload...');
                // Upload to test folder (will be: stpaulschurch/test)
                const imageUrl = await uploadImageToCloudinary(file, 'test');
                
                console.log('6. Upload completed successfully!');
                console.log('Image URL:', imageUrl);
                
                resultDiv.className = 'success';
                resultDiv.innerHTML = `
                    <p><strong>✅ Upload Successful!</strong></p>
                    <p><strong>Image URL:</strong> <a href="${imageUrl}" target="_blank">${imageUrl}</a></p>
                    <p><strong>Check Cloudinary:</strong> Go to Media Library → stpaulschurch → test folder</p>
                    <img src="${imageUrl}" alt="Uploaded image" style="max-width: 100%; margin-top: 10px;">
                `;
            } catch (error) {
                console.error('=== UPLOAD ERROR ===');
                console.error('Error type:', error.constructor.name);
                console.error('Error message:', error.message);
                console.error('Error stack:', error.stack);
                
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <p><strong>❌ Upload Failed!</strong></p>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p><strong>Details:</strong> Check the browser console (F12) for full error details.</p>
                    <p style="margin-top: 10px; font-size: 0.9em; color: #666;">
                        Common issues:<br>
                        • Upload preset not found - Check preset name matches exactly<br>
                        • Preset not set to "Unsigned" - Check Cloudinary dashboard<br>
                        • Network error - Check internet connection<br>
                        • CORS error - Should not happen with Cloudinary
                    </p>
                `;
            }
        }
        
        // Test configuration on page load
        window.addEventListener('load', function() {
            console.log('=== PAGE LOADED ===');
            console.log('Checking if Cloudinary is configured...');
            
            if (typeof cloudinaryConfig !== 'undefined') {
                console.log('✅ cloudinaryConfig loaded');
                console.log('  Cloud Name:', cloudinaryConfig.cloudName);
                console.log('  Upload Preset:', cloudinaryConfig.uploadPreset);
            } else {
                console.error('❌ cloudinaryConfig NOT loaded!');
            }
            
            if (typeof cloudinaryUploadUrl !== 'undefined') {
                console.log('✅ cloudinaryUploadUrl loaded:', cloudinaryUploadUrl);
            } else {
                console.error('❌ cloudinaryUploadUrl NOT loaded!');
            }
            
            if (typeof uploadImageToCloudinary !== 'undefined') {
                console.log('✅ uploadImageToCloudinary function loaded');
            } else {
                console.error('❌ uploadImageToCloudinary function NOT loaded!');
            }
        });
    </script>
</body>
</html>
