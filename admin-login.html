    <link rel="manifest" href="site.webmanifest">

    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
            padding: 2rem;
            padding-top: 10rem;
        }

        .admin-login-box {
            background-color: #ffffff;
            padding: 4rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
        }

        .admin-login-box h2 {
            font-family: "Montserrat", sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .admin-login-box .subtitle {
            font-family: "Open Sans", sans-serif;
            font-size: 1.5rem;
            color: #666666;
            text-align: center;
            margin-bottom: 3rem;
        }

        .admin-form-group {
            margin-bottom: 2rem;
        }

        .admin-form-group label {
            display: block;
            font-family: "Montserrat", sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 0.8rem;
        }

        .admin-form-group input {
            width: 100%;
            padding: 1.2rem;
            font-family: "Open Sans", sans-serif;
            font-size: 1.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 4px;
            transition: border-color 0.3s;
        }

        .admin-form-group input:focus {
            outline: none;
            border-color: #000000;
        }

        .admin-login-btn {
            width: 100%;
            padding: 1.4rem;
            font-family: "Montserrat", sans-serif;
            font-size: 1.6rem;
            font-weight: 600;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .admin-login-btn:hover {
            background-color: #333333;
        }

        .admin-error-message {
            color: #dd4043;
            font-family: "Open Sans", sans-serif;
            font-size: 1.4rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }

        .admin-error-message.show {
            display: block;
        }

        @media screen and (max-width: 500px) {
            .admin-login-box {
                padding: 2.5rem;
            }

            .admin-login-box h2 {
                font-size: 2.4rem;
            }
        }
    </style>

</head>

<body id="top">

    <!-- header
    ================================================== -->
    <header class="s-header">

        <div class="header-logo">
            <a class="site-logo" href="index.html">
                <img src="images/logo.svg" alt="Homepage">

            <ul class="header-nav">

                        <li><a href="clc.html" title="CLC">CLC</a></li>

            </ul>

        <a class="header-menu-toggle" href="#0"><span>Menu</span></a>

    </header> <!-- end s-header -->

    <div class="admin-login-container">
        <div class="admin-login-box">
            <h2>Admin Login</h2>
            <p class="subtitle">St. Paul's Church Thaikkattussery</p>
            
            <form id="adminLoginForm">
                <div class="admin-form-group">
                    <label for="adminId">Admin ID</label>
                    <input type="text" id="adminId" name="adminId" required autocomplete="off">
                </div>

                <div class="admin-form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" name="adminPassword" required>
                </div>

                <button type="submit" class="admin-login-btn">Login</button>
                
                <div id="errorMessage" class="admin-error-message"></div>
            </form>
        </div>
    </div>

    <!-- Java Script
    ================================================== -->
    <script src="js/jquery-3.2.1.min.js"></script>
    <script src="js/plugins.js"></script>
    <script>
        $(document).ready(function() {
            $('#adminLoginForm').on('submit', function(e) {
                e.preventDefault();
                
                const adminId = $('#adminId').val();
                const password = $('#adminPassword').val();
                
                if (adminId === 'sunny' && password === 'biju') {
                    // Store login status
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    // Redirect to dashboard
                    window.location.href = 'admin-dashboard.html';
                } else {
                    $('#errorMessage').text('Invalid Admin ID or Password').addClass('show');
                    setTimeout(function() {
                        $('#errorMessage').removeClass('show');
                    }, 3000);
                }
            });
        });
    </script>

</body>
